<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Удостоверение личности</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f44336">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="icon.png">

  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Roboto', sans-serif;
      background: #fff;
      color: #333;
      font-size: 14px;
      /* Отключаем выделение текста и системные жесты, чтобы было похоже на приложение */
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .header {
      position: relative;
      text-align: center;
      padding: 15px 0;
      font-size: 18px;
      font-weight: 500;
      border-bottom: 1px solid #eee;
    }

    .back-arrow {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      width: 20px;
      height: 20px;
    }

    .tabs {
      display: flex;
      width: 100%;
      padding: 10px 16px 0;
    }

    .tab {
      flex: 1;
      text-align: center;
      padding: 10px 0;
      font-size: 14px;
      font-weight: 500;
      color: #f44336;
      border: 1px solid #f44336;
      background-color: #fff;
      cursor: pointer;
      border-right: none;
    }

    .tab:last-child {
      border-right: 1px solid #f44336;
      border-top-right-radius: 8px;
      border-bottom-right-radius: 8px;
    }

    .tab:first-child {
      border-top-left-radius: 8px;
      border-bottom-left-radius: 8px;
    }

    .tab.active {
      background-color: #f44336;
      color: #fff;
    }

    .upload-container {
      display: flex;
      justify-content: center;
      margin: 40px 0;
    }

    .upload-btn {
      padding: 12px 28px;
      border: 2px solid #e65c43;
      border-radius: 24px;
      color: #e65c43;
      font-size: 16px;
      background: none;
      cursor: pointer;
      font-weight: 500;
    }

    .hidden {
      display: none !important;
    }

    .image-wrapper {
      margin-top: 10px;
      padding: 0;
    }

    .zoom-container {
      overflow: hidden;
      touch-action: none;
      background-color: #f9f9f9;
    }

    .zoom-container img {
      transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      transform-origin: center center;
      width: 100%;
      height: auto;
      display: block;
    }

    .content {
      padding: 0 16px;
      margin-top: 10px;
    }

    .field-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .field-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid #eee;
      color: #333;
      font-size: 15px;
    }

    .field-text {
      flex: 1;
      padding-right: 10px;
    }

    .field-item img {
      width: 22px;
      height: 22px;
      cursor: pointer;
      opacity: 0.6;
    }

    .bottom-buttons {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 12px;
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      background: #fff;
    }

    .main-btn {
      background-color: #1a90d9;
      color: white;
      border: none;
      padding: 16px 0;
      font-size: 16px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      border-radius: 12px;
      cursor: pointer;
    }

    .main-btn img.qr-icon {
      width: 24px;
      height: 24px;
      margin-right: 10px;
    }

    .secondary-btn {
      background: none;
      color: #1a90d9;
      border: none;
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      padding: 10px;
    }

    .secondary-btn img {
      width: 20px;
      height: 20px;
      margin-right: 8px;
    }

    @media (min-width: 768px) {
      .main-btn {
        max-width: 400px;
      }
      .bottom-buttons {
        position: static;
      }
    }
  </style>
</head>
<body>

  <div class="header">
    <img src="arrow.png" alt="Назад" class="back-arrow">
    Удостоверение личности
  </div>

  <div class="tabs">
    <div class="tab active" onclick="showTab('doc')">Документ</div>
    <div class="tab" onclick="showTab('info')">Реквизиты</div>
  </div>

  <div class="upload-container" id="uploadBlock">
    <label for="fileInput" class="upload-btn">Загрузить документ</label>
    <input id="fileInput" type="file" accept="image/*" class="hidden" onchange="handleUpload(this)">
  </div>

  <div class="image-wrapper hidden" id="imageWrapper">
    <div class="zoom-container" id="zoomContainer">
      <img id="uploadedImage" src="" alt="Загруженный документ">
    </div>
  </div>

  <div class="content">
    <div id="tab-doc" class="tab-content"></div>

    <div id="tab-info" class="tab-content hidden">
      <ul class="field-list">
        <li class="field-item">
          <span class="field-text">Иванов Иван Иванович</span>
          <img src="copy.png" alt="Копировать" onclick="copyText(this)">
        </li>
        <li class="field-item">
          <span class="field-text">123456789012</span>
          <img src="copy.png" alt="Копировать" onclick="copyText(this)">
        </li>
        <li class="field-item">
          <span class="field-text">01.01.1990</span>
          <img src="copy.png" alt="Копировать" onclick="copyText(this)">
        </li>
        <li class="field-item">
          <span class="field-text">N01234567</span>
          <img src="copy.png" alt="Копировать" onclick="copyText(this)">
        </li>
        <li class="field-item">
          <span class="field-text">15.05.2020</span>
          <img src="copy.png" alt="Копировать" onclick="copyText(this)">
        </li>
      </ul>
    </div>
  </div>

  <div style="height: 160px;"></div> <div class="bottom-buttons">
    <button class="main-btn">
      <img src="qr.png" alt="QR" class="qr-icon">
      Предъявить документ
    </button>
    <button class="secondary-btn">
      <img src="upload.png" alt="Upload">
      Отправить документ
    </button>
  </div>

<script>
  // Регистрация Service Worker для работы PWA (fullscreen-режима)
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js')
      .then(() => console.log('Service Worker зарегистрирован'))
      .catch(err => console.error('Ошибка SW:', err));
  }

  function showTab(name) {
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    const imageWrapper = document.getElementById('imageWrapper');
    const uploadBlock = document.getElementById('uploadBlock');
    const uploadedImage = document.getElementById('uploadedImage');

    tabs.forEach(t => t.classList.remove('active'));
    contents.forEach(c => c.classList.add('hidden'));

    if (name === 'doc') {
      tabs[0].classList.add('active');
      document.getElementById('tab-doc').classList.remove('hidden');
      
      if (uploadedImage.getAttribute('src') && uploadedImage.getAttribute('src') !== "") {
        imageWrapper.classList.remove('hidden');
        uploadBlock.classList.add('hidden');
      } else {
        uploadBlock.classList.remove('hidden');
        imageWrapper.classList.add('hidden');
      }
    } else {
      tabs[1].classList.add('active');
      document.getElementById('tab-info').classList.remove('hidden');
      imageWrapper.classList.add('hidden');
      uploadBlock.classList.add('hidden');
    }
  }

  function handleUpload(input) {
    const file = input.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        const img = document.getElementById('uploadedImage');
        img.src = e.target.result;
        document.getElementById('imageWrapper').classList.remove('hidden');
        document.getElementById('uploadBlock').classList.add('hidden');
        resetZoom();
      };
      reader.readAsDataURL(file);
    }
  }

  function copyText(element) {
    const textToCopy = element.parentElement.querySelector('.field-text').innerText;
    navigator.clipboard.writeText(textToCopy).then(() => {
      element.style.transform = 'scale(1.3)';
      setTimeout(() => element.style.transform = 'scale(1)', 200);
    });
  }

  // --- Zoom & Pan Logic ---
  const zoomContainer = document.getElementById('zoomContainer');
  const img = document.getElementById('uploadedImage');

  let scale = 1, translateX = 0, translateY = 0, startX = 0, startY = 0, isDragging = false;

  function updateTransform() {
    img.style.transform = `translate(${translateX}px, ${translateY}px) scale(${scale})`;
  }

  function resetZoom() {
    scale = 1; translateX = 0; translateY = 0; updateTransform();
  }

  zoomContainer?.addEventListener('wheel', function (e) {
    e.preventDefault();
    const delta = e.deltaY * -0.001;
    const prevScale = scale;
    scale = Math.min(Math.max(1, scale + delta), 4);
    const rect = img.getBoundingClientRect();
    translateX -= (e.clientX - rect.left - rect.width / 2) * (scale - prevScale) / scale;
    translateY -= (e.clientY - rect.top - rect.height / 2) * (scale - prevScale) / scale;
    updateTransform();
  }, { passive: false });

  zoomContainer?.addEventListener('mousedown', function (e) {
    if (scale > 1) { isDragging = true; startX = e.clientX - translateX; startY = e.clientY - translateY; }
  });

  window.addEventListener('mouseup', () => isDragging = false);
  window.addEventListener('mousemove', function (e) {
    if (isDragging) { translateX = e.clientX - startX; translateY = e.clientY - startY; updateTransform(); }
  });

  let startDist = 0;
  zoomContainer?.addEventListener('touchstart', function (e) {
    if (e.touches.length === 2) {
      startDist = getDistance(e.touches[0], e.touches[1]);
    } else if (e.touches.length === 1 && scale > 1) {
      isDragging = true; startX = e.touches[0].clientX - translateX; startY = e.touches[0].clientY - translateY;
    }
  });

  zoomContainer?.addEventListener('touchmove', function (e) {
    if (e.touches.length === 2) {
      e.preventDefault();
      const currentDist = getDistance(e.touches[0], e.touches[1]);
      scale = Math.min(Math.max(1, scale + (currentDist - startDist) * 0.005), 4);
      startDist = currentDist; updateTransform();
    } else if (e.touches.length === 1 && isDragging) {
      translateX = e.touches[0].clientX - startX; translateY = e.touches[0].clientY - startY; updateTransform();
    }
  }, { passive: false });

  zoomContainer?.addEventListener('touchend', function (e) { if (e.touches.length < 2) isDragging = false; });
  function getDistance(t1, t2) { return Math.sqrt(Math.pow(t2.clientX - t1.clientX, 2) + Math.pow(t2.clientY - t1.clientY, 2)); }
</script>
</body>
</html>
